<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talkdesk Ultimate SE Docs Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --td-purple: #4a154b;
            --td-purple-dark: #2d0a31;
            --td-purple-mid: #6b2d6d;
            --td-accent: #c95dc8;
            --td-bg: #f8f5f9;
            --td-border: #e8e0e9;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--td-bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            width: 100%;
            background: linear-gradient(135deg, var(--td-purple-dark) 0%, var(--td-purple) 60%, var(--td-purple-mid) 100%);
            color: white;
            padding: 36px 0 50px;
            text-align: center;
        }
        header h1 { margin: 0 0 8px; font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
        header p { margin: 0; opacity: 0.75; font-size: 13px; }
        .version-badge {
            display: inline-block;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 20px;
            padding: 3px 12px;
            font-size: 11px;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }
        .container {
            width: 98%;
            max-width: 1700px;
            margin: -28px auto 50px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 22px;
        }
        .card {
            background: white;
            border-radius: 14px;
            padding: 28px;
            box-shadow: 0 8px 30px rgba(74, 21, 75, 0.08);
            border: 1px solid var(--td-border);
        }
        h2 {
            color: var(--td-purple);
            font-size: 11px;
            margin: 0 0 16px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            border-bottom: 2px solid var(--td-bg);
            padding-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        h2 .step-badge {
            background: var(--td-purple);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            flex-shrink: 0;
        }
        textarea {
            width: 100%;
            height: 520px;
            padding: 14px;
            border: 1.5px solid var(--td-border);
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
            font-family: inherit;
            line-height: 1.6;
            resize: vertical;
            color: #333;
            transition: border-color 0.2s;
        }
        textarea:focus { outline: none; border-color: var(--td-accent); }
        textarea::placeholder { color: #aaa; }
        .btn-group { display: grid; grid-template-columns: 3fr 1fr; gap: 10px; }
        .btn {
            background: linear-gradient(135deg, var(--td-purple) 0%, var(--td-purple-mid) 100%);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.2s;
            letter-spacing: 0.2px;
        }
        .btn:hover { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(74,21,75,0.3); }
        .btn-clear {
            background: var(--td-bg);
            color: #666;
            border: 1.5px solid var(--td-border);
        }
        .btn-clear:hover { background: #ede8ee; box-shadow: none; }
        .output-box {
            background: #fdfcfd;
            border: 1.5px solid var(--td-border);
            border-radius: 10px;
            padding: 18px 18px 10px;
            min-height: 600px;
            color: #1d1d1f;
            font-size: 13px;
        }
        /* Top action bar */
        .output-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .copy-all-btn {
            background: var(--td-purple);
            color: white;
            border: none;
            padding: 7px 16px;
            border-radius: 7px;
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .copy-all-btn:hover { opacity: 0.88; transform: translateY(-1px); }
        .copy-all-btn.copied { background: #2d8a4e; }
        /* Per-section blocks */
        .result-section {
            background: white;
            border: 1.5px solid var(--td-border);
            border-radius: 9px;
            margin-bottom: 10px;
            overflow: hidden;
        }
        .result-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 9px 12px 9px 14px;
            background: #f7f2f8;
            border-bottom: 1.5px solid var(--td-border);
            gap: 8px;
        }
        .result-section-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--td-purple);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .section-copy-btn {
            background: white;
            border: 1px solid var(--td-border);
            padding: 3px 11px;
            border-radius: 5px;
            font-size: 10px;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            color: var(--td-purple);
            transition: all 0.15s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .section-copy-btn:hover { background: var(--td-purple); color: white; border-color: var(--td-purple); }
        .section-copy-btn.copied { background: #2d8a4e; color: white; border-color: #2d8a4e; }
        .result-section-urls {
            padding: 10px 14px 12px;
            font-family: 'Courier New', monospace;
            font-size: 11.5px;
            line-height: 1.9;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            color: #333;
        }
        .result-section-urls a {
            color: #5a0e6e;
            text-decoration: none;
        }
        .result-section-urls a:hover { text-decoration: underline; }
        /* Placeholder / empty state */
        #outputPlaceholder {
            color: #bbb;
            font-size: 13px;
            padding: 40px 10px;
            text-align: center;
            font-family: inherit;
        }
        .match-count {
            font-family: inherit;
            font-size: 11px;
            color: var(--td-purple);
            background: #f0e8f0;
            border-radius: 20px;
            padding: 2px 10px;
            margin-bottom: 14px;
            display: none;
            width: fit-content;
        }
        .section-label {
            font-family: inherit;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999;
            margin: 14px 0 4px;
        }
        /* Category filter chips */
        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            margin-bottom: 16px;
        }
        .chip {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1.5px solid var(--td-border);
            background: white;
            color: #666;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
        }
        .chip:hover, .chip.active {
            background: var(--td-purple);
            color: white;
            border-color: var(--td-purple);
        }
    </style>
</head>
<body>

<header>
    <h1>Talkdesk SE Docs Engine</h1>
    <p>The Comprehensive Solutions Engineering Documentation Repository</p>
    <div class="version-badge">V39 — Gap Fills</div>
</header>

<div class="container">
    <div class="card">
        <h2><span class="step-badge">1</span>Paste Requirements or RFP Question</h2>
        <div class="filter-row" id="filterRow">
            <button class="chip active" onclick="toggleFilter(this, 'all')">All</button>
            <button class="chip" onclick="toggleFilter(this, 'studio')">Studio</button>
            <button class="chip" onclick="toggleFilter(this, 'integrations')">Integrations</button>
            <button class="chip" onclick="toggleFilter(this, 'appconnect')">AppConnect</button>
            <button class="chip" onclick="toggleFilter(this, 'data-dictionary')">Data Dictionary</button>
            <button class="chip" onclick="toggleFilter(this, 'docs-api')">Docs / APIs</button>
            <button class="chip" onclick="toggleFilter(this, 'support')">Support</button>
        </div>
        <textarea id="userInput" placeholder="Paste RFP, question, or technical requirements here...

Examples:
- 'Does Talkdesk integrate with Salesforce and ServiceNow?'
- 'How does callback from queue work in Studio?'
- 'What APIs are available for user management and reporting?'
- 'Do you have workforce management and WFM APIs?'"></textarea>
        <div class="btn-group">
            <button class="btn" onclick="processQuery()">⚡ Generate Documentation Links</button>
            <button class="btn btn-clear" onclick="clearAll()">Clear</button>
        </div>
    </div>
    <div class="card">
        <h2><span class="step-badge">2</span>Relevant Documentation Links</h2>
        <div class="match-count" id="matchCount"></div>
        <div class="output-box" id="outputBox">
            <div class="output-actions" id="outputActions" style="display:none;">
                <span style="font-size:11px;color:#999;font-family:inherit;">Click any section's button to copy just that group</span>
                <button class="copy-all-btn" id="copyAllBtn" onclick="copyAll()">⎘ Copy All</button>
            </div>
            <div id="outputSections"></div>
            <div id="outputPlaceholder">Documentation links will generate based on your input above...</div>
        </div>
    </div>
</div>

let activeFilter = 'all';
function toggleFilter(el, category) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    activeFilter = category;
}

// ============================================================
// PROCESSING
// ============================================================
const categoryLabels = {
    'studio':          '📐 Studio Components & Flows',
    'integrations':    '🔗 Integrations (Support Portal)',
    'appconnect':      '🏪 AppConnect Marketplace',
    'data-dictionary': '📊 Data Dictionary',
    'docs-api':        '🛠 Developer Docs & APIs',
    'support':         '📚 Support Knowledge Base'
};
const categoryOrder = ['studio', 'integrations', 'appconnect', 'data-dictionary', 'docs-api', 'support'];

// Store last results so copy functions can access them
let lastResults = {};

function processQuery() {
    const input = ' ' + document.getElementById('userInput').value.toLowerCase() + ' ';
    if (!input.trim()) {
        showPlaceholder('Please enter a question or requirements above.');
        return;
    }

    // Group-based suppression: if any tier:'s' (specific) entry from a group fires,
    // suppress all tier:'g' (generic) entries from the same group.

    // Pass 1: collect all matches and the set of groups that have a specific hit
    const allMatches = [];
    const groupsWithSpecificHit = new Set();

    docMap.forEach(item => {
        if (activeFilter !== 'all' && item.category !== activeFilter) return;
        if (item.keys.some(k => input.includes(k))) {
            allMatches.push(item);
            if (item.tier === 's') groupsWithSpecificHit.add(item.group);
        }
    });

    // Pass 2: build results, skipping generic entries whose group has a specific hit
    const matchedByCategory = {};
    allMatches.forEach(item => {
        if (item.tier === 'g' && item.group && groupsWithSpecificHit.has(item.group)) return;
        if (!matchedByCategory[item.category]) matchedByCategory[item.category] = new Set();
        item.urls.forEach(u => matchedByCategory[item.category].add(u));
    });

    let totalLinks = 0;
    categoryOrder.forEach(c => { if (matchedByCategory[c]) totalLinks += matchedByCategory[c].size; });

    if (totalLinks === 0) {
        lastResults = {};
        showPlaceholder('No specific documentation found.\n\nGeneral resources:\n• https://support.talkdesk.com/hc/en-us\n• https://docs.talkdesk.com/\n• https://studio.talkdesk.com/docs/talkdesk-studio-intro\n• https://appconnect.talkdesk.com/\n• https://data-dictionary.talkdesk.com/');
        document.getElementById('matchCount').style.display = 'none';
        return;
    }

    lastResults = matchedByCategory;
    renderSections(matchedByCategory);

    const countEl = document.getElementById('matchCount');
    countEl.style.display = 'block';
    countEl.textContent = `✓ ${totalLinks} relevant link${totalLinks !== 1 ? 's' : ''} found across ${Object.keys(matchedByCategory).length} section${Object.keys(matchedByCategory).length !== 1 ? 's' : ''}`;
}

function renderSections(matchedByCategory) {
    const sectionsEl = document.getElementById('outputSections');
    const placeholder = document.getElementById('outputPlaceholder');
    const actionsBar = document.getElementById('outputActions');

    placeholder.style.display = 'none';
    actionsBar.style.display = 'flex';
    sectionsEl.innerHTML = '';

    categoryOrder.forEach(cat => {
        if (!matchedByCategory[cat]) return;
        const urls = Array.from(matchedByCategory[cat]);
        const label = categoryLabels[cat];

        const section = document.createElement('div');
        section.className = 'result-section';
        section.dataset.cat = cat;

        const header = document.createElement('div');
        header.className = 'result-section-header';

        const labelEl = document.createElement('span');
        labelEl.className = 'result-section-label';
        labelEl.textContent = label;

        const copyBtn = document.createElement('button');
        copyBtn.className = 'section-copy-btn';
        copyBtn.textContent = 'Copy Section';
        copyBtn.onclick = () => copySectionByEl(copyBtn, label, urls);

        header.appendChild(labelEl);
        header.appendChild(copyBtn);

        const urlsEl = document.createElement('div');
        urlsEl.className = 'result-section-urls';
        urlsEl.textContent = urls.map(u => '• ' + u).join('\n');

        section.appendChild(header);
        section.appendChild(urlsEl);
        sectionsEl.appendChild(section);
    });

    // Reset copy-all button
    const copyAllBtn = document.getElementById('copyAllBtn');
    copyAllBtn.textContent = '⎘ Copy All';
    copyAllBtn.classList.remove('copied');
}

function showPlaceholder(msg) {
    document.getElementById('outputSections').innerHTML = '';
    document.getElementById('outputActions').style.display = 'none';
    const ph = document.getElementById('outputPlaceholder');
    ph.style.display = 'block';
    ph.style.textAlign = 'left';
    ph.style.whiteSpace = 'pre-wrap';
    ph.style.fontFamily = "'Courier New', monospace";
    ph.style.fontSize = '12px';
    ph.style.color = '#888';
    ph.style.padding = '16px 4px';
    ph.textContent = msg;
}

// ============================================================
// COPY FUNCTIONS
// ============================================================
function copySectionByEl(btn, label, urls) {
    const text = `— ${label} —\n` + urls.map(u => '• ' + u).join('\n');
    navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '✓ Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
            btn.textContent = 'Copy Section';
            btn.classList.remove('copied');
        }, 2000);
    });
}

function copyAll() {
    if (!Object.keys(lastResults).length) return;
    let text = 'For more information please review our documentation:\n\n';
    categoryOrder.forEach(cat => {
        if (!lastResults[cat]) return;
        text += `— ${categoryLabels[cat]} —\n`;
        text += Array.from(lastResults[cat]).map(u => '• ' + u).join('\n');
        text += '\n\n';
    });
    navigator.clipboard.writeText(text.trim()).then(() => {
        const btn = document.getElementById('copyAllBtn');
        btn.textContent = '✓ All Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
            btn.textContent = '⎘ Copy All';
            btn.classList.remove('copied');
        }, 2000);
    });
}

function clearAll() {
    document.getElementById('userInput').value = '';
    lastResults = {};
    document.getElementById('outputSections').innerHTML = '';
    document.getElementById('outputActions').style.display = 'none';
    document.getElementById('matchCount').style.display = 'none';
    const ph = document.getElementById('outputPlaceholder');
    ph.style.display = 'block';
    ph.style.textAlign = 'center';
    ph.style.whiteSpace = 'normal';
    ph.style.fontFamily = 'inherit';
    ph.style.fontSize = '13px';
    ph.style.color = '#bbb';
    ph.style.padding = '40px 10px';
    ph.textContent = 'Documentation links will generate based on your input above...';
}

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('userInput').addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.key === 'Enter') { processQuery(); }
    });
});
</script>
